<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 580" fill="none">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <style>
      @keyframes mapFade { from{opacity:0;transform:scale(0.98)} to{opacity:1;transform:scale(1)} }
      @keyframes pinBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
      @keyframes navGlow { 0%,100%{filter:drop-shadow(0 0 0 transparent)} 50%{filter:drop-shadow(0 0 6px rgba(220,38,38,0.4))} }
      .map-content { animation: mapFade 0.6s ease both; }
      .map-pin { animation: pinBounce 1.5s ease infinite; }
      .pulse-dot { animation: pulse 2s ease infinite; }
      .nav-active { animation: navGlow 2s ease infinite; }
    </style>
  </defs>

  <!-- Phone Frame -->
  <rect width="320" height="580" rx="24" fill="#f8f9fa"/>
  <rect x="4" y="4" width="312" height="572" rx="22" fill="#E8F0E8"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="320" height="44" fill="white" opacity="0.95"/>
  <text x="28" y="30" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">9:41</text>
  <circle cx="260" cy="24" r="4" fill="#34C759"/>
  <rect x="288" y="20" width="22" height="10" rx="2" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>
  <rect x="289" y="21" width="16" height="8" rx="1.5" fill="#1a1a1a"/>

  <!-- Header -->
  <rect x="0" y="44" width="320" height="52" fill="white" opacity="0.95"/>
  <rect x="16" y="52" width="48" height="32" rx="8" fill="url(#headerGrad)"/>
  <text x="26" y="73" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800" fill="white">K</text>
  <text x="76" y="74" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="800" fill="#1a1a1a">KONEK</text>

  <!-- Search Bar -->
  <rect x="16" y="104" width="288" height="36" rx="18" fill="white" stroke="#E5E7EB" stroke-width="1"/>
  <text x="44" y="126" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#9CA3AF">&#128269; Select Monitor</text>
  <text x="270" y="126" font-family="Inter,system-ui,sans-serif" font-size="12" fill="#9CA3AF">&#9660;</text>

  <!-- Map Area -->
  <g class="map-content">
    <!-- Map background -->
    <rect x="0" y="148" width="320" height="380" fill="#D4DFD4"/>

    <!-- Water -->
    <rect x="0" y="148" width="320" height="380" fill="#B8D4E8" opacity="0.3"/>

    <!-- Landmass shapes (simplified Philippines) -->
    <path d="M140 180 L160 170 L180 175 L190 190 L185 210 L170 230 L155 240 L140 235 L130 220 L135 200 Z" fill="#C5D5C0" stroke="#B0C4A8" stroke-width="0.5"/>
    <path d="M120 260 L145 250 L165 255 L175 270 L170 290 L150 300 L130 295 L115 280 Z" fill="#C5D5C0" stroke="#B0C4A8" stroke-width="0.5"/>
    <path d="M170 300 L195 290 L215 295 L225 310 L220 330 L200 340 L180 335 L165 320 Z" fill="#C5D5C0" stroke="#B0C4A8" stroke-width="0.5"/>
    <path d="M80 340 L110 330 L130 335 L140 350 L135 370 L115 380 L95 375 L75 360 Z" fill="#C5D5C0" stroke="#B0C4A8" stroke-width="0.5"/>
    <path d="M200 350 L230 340 L250 345 L260 360 L255 380 L235 390 L215 385 L195 370 Z" fill="#C5D5C0" stroke="#B0C4A8" stroke-width="0.5"/>

    <!-- Region Labels -->
    <text x="130" y="195" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Ilocos Region</text>
    <text x="170" y="185" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Cagayan Valley</text>
    <text x="155" y="215" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Central Luzon</text>
    <text x="140" y="245" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Bicol Region</text>
    <text x="200" y="310" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Eastern Visayas</text>
    <text x="155" y="290" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Western Visayas</text>
    <text x="185" y="335" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Central Visayas</text>
    <text x="105" y="365" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Zamboanga</text>
    <text x="230" y="370" font-family="Inter,system-ui,sans-serif" font-size="7" font-weight="600" fill="#374151" text-anchor="middle">Northern Mindanao</text>

    <!-- Fault lines -->
    <path d="M100 180 Q130 220 110 280 Q90 340 120 400" stroke="#E53E3E" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.6"/>
    <path d="M180 160 Q200 200 190 260 Q180 320 200 380" stroke="#3B82F6" stroke-width="1.5" fill="none" stroke-dasharray="4 3" opacity="0.6"/>

    <!-- Your Location Pin -->
    <g class="map-pin" transform="translate(200, 420)">
      <circle cx="0" cy="0" r="20" fill="#3B82F6" opacity="0.15"/>
      <circle cx="0" cy="0" r="12" fill="#3B82F6" opacity="0.3"/>
      <circle cx="0" cy="0" r="6" fill="#3B82F6"/>
      <circle cx="0" cy="0" r="3" fill="white"/>
      <path d="M0 -18 L6 -8 L0 -12 L-6 -8 Z" fill="#3B82F6"/>
    </g>

    <!-- Map Controls -->
    <rect x="16" y="168" width="32" height="96" rx="8" fill="white" opacity="0.9"/>
    <text x="28" y="186" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#374151" text-anchor="middle">+</text>
    <line x1="18" y1="200" x2="46" y2="200" stroke="#E5E7EB" stroke-width="1"/>
    <text x="28" y="218" font-family="Inter,system-ui,sans-serif" font-size="16" font-weight="600" fill="#374151" text-anchor="middle">-</text>

    <rect x="272" y="168" width="32" height="32" rx="8" fill="white" opacity="0.9"/>
    <text x="288" y="190" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#374151" text-anchor="middle">&#9776;</text>

    <rect x="272" y="208" width="32" height="32" rx="8" fill="white" opacity="0.9"/>
    <circle cx="288" cy="224" r="6" fill="none" stroke="#374151" stroke-width="1.5"/>
    <circle cx="288" cy="224" r="2" fill="#374151"/>

    <rect x="272" y="248" width="32" height="32" rx="8" fill="white" opacity="0.9"/>
    <text x="288" y="270" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#374151" text-anchor="middle">&#9906;</text>

    <!-- Legend -->
    <rect x="16" y="440" width="120" height="72" rx="8" fill="white" opacity="0.92"/>
    <line x1="24" y1="456" x2="44" y2="456" stroke="#3B82F6" stroke-width="2"/>
    <text x="50" y="460" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#374151">You</text>
    <line x1="24" y1="472" x2="44" y2="472" stroke="#E53E3E" stroke-width="2"/>
    <text x="50" y="476" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#374151">Major Fault</text>
    <line x1="24" y1="488" x2="44" y2="488" stroke="#6366F1" stroke-width="2"/>
    <text x="50" y="492" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#374151">Trench</text>
    <line x1="24" y1="504" x2="44" y2="504" stroke="#F59E0B" stroke-width="2"/>
    <text x="50" y="508" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#374151">Active Fault</text>

    <!-- Tap instruction -->
    <rect x="16" y="520" width="200" height="28" rx="14" fill="white" opacity="0.9"/>
    <circle cx="32" cy="534" r="8" fill="#3B82F6" opacity="0.15"/>
    <circle cx="32" cy="534" r="4" fill="#3B82F6" class="pulse-dot"/>
    <text x="44" y="538" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#6B7280">Tap map to check any location</text>
  </g>

  <!-- Bottom Nav -->
  <rect x="0" y="540" width="320" height="40" fill="white"/>
  <g class="nav-item">
    <text x="40" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#8962; Home</text>
  </g>
  <g class="nav-active">
    <rect x="90" y="544" width="60" height="32" rx="16" fill="url(#headerGrad)"/>
    <text x="100" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">&#9878; Map</text>
  </g>
  <text x="178" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#9878;</text>
  <text x="228" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#9881;</text>
  <text x="278" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#9201;</text>
</svg>
