<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 580" fill="none">
  <defs>
    <linearGradient id="sosGrad" x1="0" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
      @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
      @keyframes sosPulse { 0%{r:24;opacity:0.3} 100%{r:40;opacity:0} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
      .cat-card { animation: slideUp 0.5s ease both; }
      .cat-card:nth-child(1){animation-delay:0.1s} .cat-card:nth-child(2){animation-delay:0.15s}
      .cat-card:nth-child(3){animation-delay:0.2s} .cat-card:nth-child(4){animation-delay:0.25s}
      .cat-card:nth-child(5){animation-delay:0.3s} .cat-card:nth-child(6){animation-delay:0.35s}
      .cat-card:nth-child(7){animation-delay:0.4s} .cat-card:nth-child(8){animation-delay:0.45s}
      .cat-card:nth-child(9){animation-delay:0.5s}
      .sos-ring { animation: sosPulse 2s ease-out infinite; }
      .nav-item.active svg { animation: float 2s ease infinite; }
    </style>
  </defs>

  <!-- Phone Frame -->
  <rect width="320" height="580" rx="24" fill="#f8f9fa"/>
  <rect x="4" y="4" width="312" height="572" rx="22" fill="white"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="320" height="44" fill="white"/>
  <text x="28" y="30" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">9:41</text>
  <circle cx="260" cy="24" r="4" fill="#34C759"/>
  <text x="270" y="28" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">5G</text>
  <rect x="288" y="20" width="22" height="10" rx="2" stroke="#1a1a1a" stroke-width="1.2" fill="none"/>
  <rect x="289" y="21" width="16" height="8" rx="1.5" fill="#1a1a1a"/>

  <!-- Header -->
  <rect x="0" y="44" width="320" height="56" fill="white"/>
  <rect x="16" y="54" width="48" height="32" rx="8" fill="url(#sosGrad)"/>
  <text x="26" y="75" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="800" fill="white">K</text>
  <text x="76" y="76" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="800" fill="#1a1a1a">KONEK</text>
  <circle cx="290" cy="70" r="14" fill="#f0f0f0"/>
  <text x="284" y="75" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#86868b">&#9787;</text>

  <!-- Status Chips -->
  <rect x="16" y="108" width="72" height="28" rx="14" fill="#EBF5FF"/>
  <circle cx="30" cy="122" r="4" fill="#3B82F6"/>
  <text x="38" y="126" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#3B82F6">Cloud</text>

  <rect x="96" y="108" width="100" height="28" rx="14" fill="#ECFDF5"/>
  <circle cx="110" cy="122" r="4" fill="#10B981"/>
  <text x="118" y="126" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#10B981">GPS: High</text>

  <rect x="204" y="108" width="100" height="28" rx="14" fill="#FEF3F2"/>
  <circle cx="218" cy="122" r="4" fill="#EF4444"/>
  <text x="226" y="126" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#EF4444">No MDRRMO</text>

  <!-- SOS Button -->
  <rect x="16" y="148" width="288" height="72" rx="16" fill="url(#sosGrad)" filter="url(#glow)"/>
  <circle class="sos-ring" cx="52" cy="184" r="24" fill="none" stroke="#ff6b6b" stroke-width="2"/>
  <text x="42" y="190" font-family="Inter,system-ui,sans-serif" font-size="22" fill="white">&#9888;</text>
  <text x="76" y="176" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="800" fill="white">SEND SOS</text>
  <text x="76" y="196" font-family="Inter,system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.8)">Tap to send emergency alert</text>

  <!-- Report Incident -->
  <rect x="16" y="232" width="288" height="44" rx="12" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1"/>
  <rect x="28" y="242" width="24" height="24" rx="6" fill="#0EA5E9"/>
  <text x="33" y="259" font-family="Inter,system-ui,sans-serif" font-size="14" fill="white">&#9782;</text>
  <text x="60" y="251" font-family="Inter,system-ui,sans-serif" font-size="13" font-weight="600" fill="#0EA5E9">Report Incident</text>
  <text x="168" y="251" font-family="Inter,system-ui,sans-serif" font-size="11" fill="#94A3B8">with photo proof</text>

  <!-- Emergency Categories Label -->
  <text x="16" y="304" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700" fill="#1a1a1a">Emergency Categories</text>

  <!-- Category Grid -->
  <g class="cat-card">
    <rect x="16" y="316" width="88" height="76" rx="12" fill="#FEF2F2" stroke="#FECACA" stroke-width="0.5"/>
    <rect x="40" y="326" width="40" height="40" rx="10" fill="#FEE2E2"/>
    <text x="50" y="353" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#DC2626">&#9764;</text>
    <text x="36" y="382" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Medical</text>
  </g>
  <g class="cat-card">
    <rect x="116" y="316" width="88" height="76" rx="12" fill="#FFF7ED" stroke="#FED7AA" stroke-width="0.5"/>
    <rect x="140" y="326" width="40" height="40" rx="10" fill="#FFEDD5"/>
    <text x="150" y="353" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#EA580C">&#9832;</text>
    <text x="136" y="382" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Fire</text>
  </g>
  <g class="cat-card">
    <rect x="216" y="316" width="88" height="76" rx="12" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="0.5"/>
    <rect x="240" y="326" width="40" height="40" rx="10" fill="#E0F2FE"/>
    <text x="248" y="353" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#0284c7">&#127754;</text>
    <text x="236" y="382" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Flood</text>
  </g>

  <g class="cat-card">
    <rect x="16" y="400" width="88" height="76" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
    <rect x="40" y="410" width="40" height="40" rx="10" fill="#FEF3C7"/>
    <text x="50" y="437" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#D97706">&#127758;</text>
    <text x="28" y="466" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Earthquake</text>
  </g>
  <g class="cat-card">
    <rect x="116" y="400" width="88" height="76" rx="12" fill="#F5F3FF" stroke="#DDD6FE" stroke-width="0.5"/>
    <rect x="140" y="410" width="40" height="40" rx="10" fill="#EDE9FE"/>
    <text x="150" y="437" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#7C3AED">&#127744;</text>
    <text x="137" y="466" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Typhoon</text>
  </g>
  <g class="cat-card">
    <rect x="216" y="400" width="88" height="76" rx="12" fill="#FFFBEB" stroke="#FDE68A" stroke-width="0.5"/>
    <rect x="240" y="410" width="40" height="40" rx="10" fill="#FEF3C7"/>
    <text x="250" y="437" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#D97706">&#128680;</text>
    <text x="240" y="466" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Rescue</text>
  </g>

  <g class="cat-card">
    <rect x="16" y="484" width="88" height="76" rx="12" fill="#ECFDF5" stroke="#A7F3D0" stroke-width="0.5"/>
    <rect x="40" y="494" width="40" height="40" rx="10" fill="#D1FAE5"/>
    <text x="50" y="521" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#059669">&#128737;</text>
    <text x="38" y="550" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Security</text>
  </g>
  <g class="cat-card">
    <rect x="116" y="484" width="88" height="76" rx="12" fill="#FDF2F8" stroke="#FBCFE8" stroke-width="0.5"/>
    <rect x="140" y="494" width="40" height="40" rx="10" fill="#FCE7F3"/>
    <text x="150" y="521" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#DB2777">&#128165;</text>
    <text x="133" y="550" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Outbreak</text>
  </g>
  <g class="cat-card">
    <rect x="216" y="484" width="88" height="76" rx="12" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="0.5"/>
    <rect x="240" y="494" width="40" height="40" rx="10" fill="#F1F5F9"/>
    <text x="250" y="521" font-family="Inter,system-ui,sans-serif" font-size="18" fill="#64748B">&#9874;</text>
    <text x="224" y="550" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="#374151">Infrastructure</text>
  </g>

  <!-- Bottom Nav -->
  <rect x="0" y="540" width="320" height="40" rx="0" fill="white" stroke="#f0f0f0" stroke-width="0.5"/>
  <g class="nav-item active">
    <rect x="16" y="544" width="56" height="32" rx="16" fill="url(#sosGrad)"/>
    <text x="30" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="600" fill="white">&#8962; Home</text>
  </g>
  <text x="88" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#9783;</text>
  <text x="138" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#9878;</text>
  <text x="188" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#9881;</text>
  <text x="238" y="565" font-family="Inter,system-ui,sans-serif" font-size="10" fill="#86868b">&#9201;</text>
</svg>
